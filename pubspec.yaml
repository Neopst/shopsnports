name: shopsnports
description: ShopsNports mobile app
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  cached_network_image: ^3.3.1
  carousel_slider: ^5.1.1
  cloud_firestore: ^4.15.0
  cloud_functions: ^4.6.0
  file_picker: ^8.0.0
  firebase_auth: ^4.19.0
  firebase_core: ^2.28.0
  firebase_analytics: ^10.9.0
  firebase_crashlytics: ^3.5.0
  firebase_storage: ^11.7.0
  flutter:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_riverpod: ^2.5.0
  geocoding: ^2.2.0
  geolocator: ^9.0.2
  http: ^1.2.0
  liquid_pull_to_refresh: ^3.0.1
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  google_sign_in: ^6.2.0
  flutter_svg: ^2.0.10
  flutter_image_compress: ^2.1.0
  image_picker: ^1.0.7
  firebase_messaging: ^14.9.0
  intl: ^0.19.0
  # PDF packages temporarily removed - not compatible with Android SDK 36
  # pdf: ^3.10.8
  # printing: ^5.12.0
  share_plus: ^7.2.2
  path_provider: ^2.1.2
  mobile_scanner: ^3.5.6
  uuid: ^4.2.0
  file_saver: ^0.2.13

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  fake_cloud_firestore: ^2.5.2

flutter:
  uses-material-design: true
  assets:
    - assets/designs/
    - assets/images/
    - assets/images/payments/
    - assets/animations/

# Configuration for flutter_launcher_icons
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"