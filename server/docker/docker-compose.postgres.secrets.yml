version: '3.8'
services:
  db:
    image: shopsnports/postgres:entrypoint
    environment:
      POSTGRES_DB: shopsnports
      POSTGRES_USER: postgres
    secrets:
      - shopsnports_postgres_server_key
      - shopsnports_postgres_server_crt
      - shopsnports_postgres_ca_crt
      - shopsnports_postgres_superuser_password
      - shopsnports_app_user_password
    volumes:
      - db_data:/var/lib/postgresql/data
    # using the custom image which bundles the entrypoint script (build it via Dockerfile.postgres-entrypoint)
    # no host bind for the entrypoint - avoids permissions/executable-bit issues on Windows hosts
    configs: []
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

secrets:
  shopsnports_postgres_server_key:
    external: true
  shopsnports_postgres_server_crt:
    external: true
  shopsnports_postgres_ca_crt:
    external: true
  shopsnports_postgres_superuser_password:
    external: true
  shopsnports_app_user_password:
    external: true

volumes:
  db_data:
    driver: local

# Alternative (recommended on Windows hosts): build the small image which bundles the entrypoint script.
# 1) Build & tag:
#    docker build -f server/docker/Dockerfile.postgres-entrypoint -t shopsnports/postgres:entrypoint .
# 2) Update this file to use image: shopsnports/postgres:entrypoint and remove the bind mount for the script.

