  - name: createNewAdmin
    entryPoint: createNewAdmin
  - name: resetAdminPasswordFn
    entryPoint: resetAdminPasswordFn
  - name: recordAdminActivity
    entryPoint: recordAdminActivity
  - name: recordAdminLogin
    entryPoint: recordAdminLogin
  - name: recordAdminLogout
