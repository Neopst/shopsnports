  - name: fetchAdminActivityLogs
    entryPoint: fetchAdminActivityLogs
  - name: fixAdminAuthClaims
    entryPoint: fixAdminAuthClaims
  - name: userCreated
    entryPoint: userCreated
  - name: affiliateCreated
    entryPoint: affiliateCreated
  - name: affiliateUpdated
    entryPoint: affiliateUpdated
  - name: onUserSignIn
    entryPoint: onUserSignIn
  - name: sendPushNotificationFn
