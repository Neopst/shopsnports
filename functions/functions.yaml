# Functions configuration for Firebase deployment
# This file helps bypass the local server analysis on Windows

specVersion: 'v1alpha1'
name: shopsnports-functions
region: us-central1
runtime: nodejs18

build:
  source: functions/
  serviceAccount: shopsnports@appspot.gserviceaccount.com

# List all functions to deploy
functions:
  - name: shippingRequestCreated
    entryPoint: shippingRequestCreated
  - name: shippingRequestUpdated
    entryPoint: shippingRequestUpdated
  - name: shipmentDelivered
    entryPoint: shipmentDelivered
  - name: generateScheduledPayouts
    entryPoint: generateScheduledPayouts
  - name: admin
    entryPoint: admin
  - name: calculateAffiliateCommission
    entryPoint: calculateAffiliateCommission
  - name: generatePayment
    entryPoint: generatePayment
  - name: processPayment
    entryPoint: processPayment
  - name: bulkProcessPayments
    entryPoint: bulkProcessPayments
  - name: exportPayments
    entryPoint: exportPayments
  - name: createInvoice
    entryPoint: createInvoice
  - name: createInvoiceHttp
    entryPoint: createInvoiceHttp
  - name: getAffiliateTokens
    entryPoint: getAffiliateTokens
  - name: adminCreateAffiliateTokens
    entryPoint: adminCreateAffiliateTokens
  - name: checkAffiliateToken
    entryPoint: checkAffiliateToken
  - name: createFormShareLink
    entryPoint: createFormShareLink
  - name: processFormShare
    entryPoint: processFormShare
  - name: checkFormShareAnalytics
    entryPoint: checkFormShareAnalytics
  - name: cleanupFormShares
    entryPoint: cleanupFormShares
  - name: cleanupRateLimits
    entryPoint: cleanupRateLimits
